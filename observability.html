<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observability Sandbox: Metrics, Logs, & Traces</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --metric-color: #38bdf8;
            --log-color: #4ade80;
            --trace-color: #fb923c;
            --error-color: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 2rem;
            line-height: 1.5;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: var(--text-muted); font-size: 0.95rem; }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        button {
            background: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:hover {
            border-color: var(--text-muted);
        }

        button.active {
            background: #2563eb;
            border-color: #3b82f6;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            height: 350px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .card-title.metrics { color: var(--metric-color); }
        .card-title.logs { color: var(--log-color); }
        .card-title.traces { color: var(--trace-color); }

        /* Metrics Layout */
        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
        }
        .metric-value {
            font-family: monospace;
            font-size: 1.25rem;
            font-weight: bold;
        }

        /* Logs Layout */
        .log-terminal {
            background: #020617;
            border-radius: 6px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            flex-grow: 1;
            color: #e2e8f0;
        }
        .log-line { margin-bottom: 0.4rem; white-space: nowrap; }
        .log-error { color: var(--error-color); }
        .log-warn { color: #fde047; }

        /* Traces Layout */
        .trace-view {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex-grow: 1;
            justify-content: center;
        }
        .trace-bar-container {
            display: flex;
            align-items: center;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .trace-label { width: 90px; color: var(--text-muted); }
        .trace-track {
            flex-grow: 1;
            background: #020617;
            height: 20px;
            border-radius: 4px;
            position: relative;
        }
        .trace-fill {
            height: 100%;
            background: var(--trace-color);
            border-radius: 4px;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .trace-fill.error {
            background: var(--error-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>Observability Core Sandbox</h1>
        <p>Toggle system behavior patterns below to observe synchronization across the Three Pillars.</p>
    </header>

    <div class="controls">
        <button id="btn-healthy" class="active" onclick="setSystemState('healthy')">Healthy State</button>
        <button id="btn-latency" onclick="setSystemState('latency')">DB Latency Spike</button>
        <button id="btn-error" onclick="setSystemState('error')">API Error Storm</button>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-header">
                <span class="card-title metrics">1. Metrics (The "When")</span>
            </div>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <div class="metric-row">
                    <span>Request Rate</span>
                    <span id="metric-rps" class="metric-value">120 RPS</span>
                </div>
                <div class="metric-row">
                    <span>Error Rate</span>
                    <span id="metric-errors" class="metric-value">0.0%</span>
                </div>
                <div class="metric-row">
                    <span>p99 Latency</span>
                    <span id="metric-latency" class="metric-value">45ms</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title logs">2. Logs (The "What")</span>
            </div>
            <div id="log-terminal" class="log-terminal">
                </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title traces">3. Traces (The "How")</span>
            </div>
            <div class="trace-view">
                <div class="trace-bar-container">
                    <span class="trace-label">Gateway</span>
                    <div class="trace-track"><div id="trace-gw" class="trace-fill" style="left: 0%; width: 100%;"></div></div>
                </div>
                <div class="trace-bar-container">
                    <span class="trace-label">Auth-SVC</span>
                    <div class="trace-track"><div id="trace-auth" class="trace-fill" style="left: 5%; width: 15%;"></div></div>
                </div>
                <div class="trace-bar-container">
                    <span class="trace-label">Core-API</span>
                    <div class="trace-track"><div id="trace-core" class="trace-fill" style="left: 20%; width: 75%;"></div></div>
                </div>
                <div class="trace-bar-container">
                    <span class="trace-label">Database</span>
                    <div class="trace-track"><div id="trace-db" class="trace-fill" style="left: 45%; width: 45%;"></div></div>
                </div>
            </div>
        </div>
    </div>
